<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA - CONVERTER</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Title Bar - ARIA Music style -->
<div class="title-bar">
  <div class="window-title">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="var(--accent)" style="vertical-align:middle;margin-right:8px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
    ARIA - CONVERTER
  </div>
  <div class="title-bar-controls">
    <button class="title-bar-btn title-bar-theme" id="titleBarTheme" title="Cambiar tema">☀</button>
    <button class="title-bar-btn title-bar-minimize" id="winMinimize" title="Minimizar"></button>
    <button class="title-bar-btn title-bar-maximize" id="winMaximize" title="Maximizar"></button>
    <button class="title-bar-btn title-bar-close" id="winClose" title="Cerrar"></button>
  </div>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <button class="btn btn-secondary" id="btn-open-file">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Abrir Archivo
  </button>

  <div class="separator"></div>

  <button class="btn btn-primary" id="btn-convert" disabled>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    Convertir
  </button>
</div>

<!-- Main -->
<div id="main">
  <!-- Left panel - Conversion types -->
  <div id="conversion-panel">
    <div id="conversion-panel-header">
      <h3>Tipo de Conversión</h3>
    </div>
    <div id="conversion-list">
      <div class="conversion-item active" data-type="video">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
        <span>Video</span>
      </div>
      <div class="conversion-item" data-type="audio">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span>Audio</span>
      </div>
      <div class="conversion-item" data-type="extract-audio">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <span>Extraer Audio</span>
      </div>
      <div class="conversion-item" data-type="image">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Imagen</span>
      </div>
      <div class="conversion-item" data-type="document">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Documento a PDF</span>
      </div>
      <div class="conversion-item" data-type="compress">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <span>Comprimir Imagen</span>
      </div>
    </div>
  </div>

  <!-- Right panel - Settings and preview -->
  <div id="right-panel">
    <!-- Settings -->
    <div id="settings-panel">
      <h3>Configuración</h3>
      <div id="settings-content">
        <div id="empty-settings">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p>Selecciona un tipo de conversión y abre un archivo</p>
        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <span class="status-msg" id="status-msg">Listo. Abre un archivo para comenzar.</span>
      <span class="status-stats" id="status-stats"></span>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="renderer.js"></script>
</body>
</html>
