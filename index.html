<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA - CONVERTER</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Dynamic partials will be loaded here -->
<div id="title-bar-container"></div>
<div id="toolbar-container"></div>
<div id="main">
  <div id="conversion-panel-container"></div>
  <div id="settings-panel-container"></div>
</div>
<div id="modals-container"></div>
<div id="console-panel-container"></div>

<script>
  // Load HTML partials dynamically
  async function loadPartial(containerId, partialPath) {
    try {
      const response = await fetch(partialPath);
      const html = await response.text();
      document.getElementById(containerId).innerHTML = html;
    } catch (error) {
      console.error(`Error loading partial ${partialPath}:`, error);
    }
  }

  // Load all partials
  Promise.all([
    loadPartial('title-bar-container', 'partials/title-bar.html'),
    loadPartial('toolbar-container', 'partials/toolbar.html'),
    loadPartial('conversion-panel-container', 'partials/conversion-panel.html'),
    loadPartial('settings-panel-container', 'partials/settings-panel.html'),
    loadPartial('modals-container', 'partials/modals.html'),
    loadPartial('console-panel-container', 'partials/console-panel.html')
  ]).then(() => {
    // After loading partials, load the main renderer script
    const script = document.createElement('script');
    script.src = 'renderer.js';
    document.body.appendChild(script);
  });
</script>

</body>
</html>
