<!-- Console Panel -->
<div id="console-panel">
  <div class="console-header">
    <h3>Consola de Logs</h3>
    <div class="console-controls">
      <button id="btn-clear-logs">Limpiar</button>
      <button id="btn-copy-logs">Copiar</button>
      <button id="btn-close-console">Cerrar</button>
    </div>
  </div>
  <div id="console-content"></div>
</div>

<!-- Context Menu -->
<div id="context-menu">
  <div class="context-menu-item" data-action="delete">Eliminar</div>
  <div class="context-menu-item" data-action="open-location">Abrir Ubicación</div>
  <div class="context-menu-item" data-action="pause">Pausar</div>
  <div class="context-menu-item" data-action="resume">Reanudar</div>
  <div class="context-menu-item" data-action="view">Ver</div>
  <div class="context-menu-item" data-action="info">Info</div>
</div>

<!-- Mini Player -->
<div id="mini-player">
  <button id="close-mini-player">×</button>
  <video id="mini-player-video" controls></video>
  <audio id="mini-player-audio" controls></audio>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>
